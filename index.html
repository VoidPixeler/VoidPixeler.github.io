<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>void_pixeler | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lenis@1.0.5/dist/lenis.min.js"></script>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:'Plus Jakarta Sans',sans-serif;
}

/* HERO */
.hero{
background:radial-gradient(circle at center,#111,#000);
}

/* HERO TEXT ANIMATION (ONLY HERE) */
.hero-title{
opacity:0;
transform:translateY(50px);
animation:fadeUp 1s ease forwards;
}

.hero-sub{
opacity:0;
transform:translateY(50px);
animation:fadeUp 1s ease forwards;
animation-delay:0.3s;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

/* SECTION */
section{
padding:110px 20px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
border-color:#f5a623;
}

/* IMAGE */
.img{
width:100%;
height:100%;
object-fit:contain;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
z-index:999;
padding:20px;
}

.modal img{
max-width:95vw;
max-height:95vh;
object-fit:contain;
}

/* BUTTON */
.btn{
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
background:#f5a623;
color:#000;
}

</style>

</head>

<body>

<!-- NAV -->

<nav class="fixed w-full z-50 bg-black/70 px-6 py-4 flex justify-between items-center">
<img src="V.png" class="w-10">
<div class="flex gap-6 text-sm uppercase tracking-widest text-gray-300">
<a href="#work" class="hover:text-[#f5a623]">Work</a>
<a href="#brand" class="hover:text-[#f5a623]">Brand</a>
<a href="#contact" class="hover:text-[#f5a623]">Contact</a>
</div>
</nav>

<!-- HERO -->

<section class="hero h-screen flex flex-col justify-center items-center text-center">

<h1 class="text-6xl md:text-8xl font-extrabold hero-title">
VOID<span class="text-[#f5a623]">_</span>PIXELER
</h1>

<p class="text-gray-400 mt-4 uppercase tracking-[0.3em] hero-sub">
Graphic & Creative Designer
</p>

</section>

<!-- VIDEO -->

<section class="text-center">
<h2 class="text-3xl md:text-4xl font-bold mb-10">Studio Motion</h2>

<div class="max-w-5xl mx-auto">
<video autoplay muted loop playsinline controls class="w-full rounded-xl">
<source src="animation.mp4" type="video/mp4">
</video>
</div>
</section>

<!-- WORK -->

<section id="work" class="max-w-6xl mx-auto">

<h2 class="text-3xl md:text-4xl font-bold text-center mb-12">Selected Work</h2>

<div class="grid md:grid-cols-3 gap-6">

<div class="card p-3 cursor-pointer" onclick="openModal('burger1.png')">
<img src="burger1.png" class="img">
</div>

<div class="card p-3 cursor-pointer" onclick="openModal('burger2.png')">
<img src="burger2.png">
</div>

<div class="card p-3 cursor-pointer" onclick="openModal('pizza1.png')">
<img src="pizza1.png">
</div>

</div>

<h3 class="text-2xl mt-16 mb-6 text-center">Restaurant Menu</h3>

<div class="grid md:grid-cols-4 gap-4">

<div class="card p-2" onclick="openMenu()"><img src="1.png"></div>
<div class="card p-2" onclick="openMenu()"><img src="2.png"></div>
<div class="card p-2" onclick="openMenu()"><img src="3.png"></div>
<div class="card p-2" onclick="openMenu()"><img src="4.png"></div>

</div>

</section>

<!-- BRAND -->

<section id="brand" class="max-w-6xl mx-auto">

<h2 class="text-3xl md:text-4xl font-bold text-center mb-12">Brand Work</h2>

<div class="grid md:grid-cols-2 gap-6">

<div class="card p-4" onclick="openModal('fanta.png')">
<img src="fanta.png">
</div>

<div class="card p-4" onclick="openModal('o.png')">
<img src="o.png">
</div>

</div>

</section>

<!-- CONTACT -->

<section id="contact" class="text-center">

<h2 class="text-4xl md:text-6xl font-extrabold mb-12">
ARE YOU <br>
<span class="text-[#f5a623] italic">Ready?</span>
</h2>

<button onclick="toggleContact()" 
class="btn px-10 py-4 bg-white text-black font-bold uppercase rounded-full">
LET'S BUILD TOGETHER </button>

<div id="contactLinks" class="mt-12 hidden flex flex-col md:flex-row justify-center gap-8 text-left">

<a href="https://instagram.com/void_pixeler" target="_blank"
class="border-l-2 border-[#f5a623] pl-4 hover:text-[#f5a623]">
Instagram - @void_pixeler </a>

<a href="https://t.me/its_ayush-here" target="_blank"
class="border-l-2 border-[#f5a623] pl-4 hover:text-[#f5a623]">
Telegram - its_ayush-here </a>

</div>

</section>

<!-- MODALS -->

<div id="modal" class="modal" onclick="closeModal()">
<img id="modalImg">
</div>

<div id="menuModal" class="modal" onclick="closeMenu()">
<div class="space-y-12 max-w-3xl">
<img src="1.png">
<img src="2.png">
<img src="3.png">
<img src="4.png">
</div>
</div>

<script>

/* SMOOTH SCROLL */
const lenis = new Lenis({duration:1.2})
function raf(time){lenis.raf(time);requestAnimationFrame(raf)}
requestAnimationFrame(raf)

/* MODAL */
function openModal(src){modal.style.display="flex";modalImg.src=src}
function closeModal(){modal.style.display="none"}
function openMenu(){menuModal.style.display="flex"}
function closeMenu(){menuModal.style.display="none"}

/* CONTACT */
function toggleContact(){contactLinks.classList.toggle("hidden")}

</script>

</body>
</html>
